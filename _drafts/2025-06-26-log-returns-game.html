<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Returns Arcade</title>
    <style>
        :root {
            --bg-color: #07111f;
            --panel-color: #101c2d;
            --panel-2: #0b1624;
            --container-bg: #101c2d;
            --primary-color: #58c7ff;
            --secondary-color: #ff68d4;
            --accent-color: #9cff57;
            --text-color: #e8eef7;
            --muted-color: #97a7bd;
            --border-color: rgba(120, 170, 255, 0.18);
            --shadow-color: rgba(0, 0, 0, 0.45);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(180deg, #07111f 0%, #050b14 100%);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 8px;
            overflow: hidden;
        }
        .app-shell {
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .game-container {
            width: 100%;
            background: rgba(21, 34, 53, 0.98);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            position: relative;
        }
        h1 {
            color: var(--primary-color);
            margin: 0 0 8px;
            font-size: 1.2em;
        }
        .game-stats {
            display: flex;
            justify-content: space-between;
            gap: 6px;
            margin-bottom: 8px;
        }
        .stat-chip {
            flex: 1;
            padding: 4px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 6px;
        }
        .stat-label { color: var(--muted-color); font-size: 0.7em; display: block; }
        .stat-value { font-weight: 700; font-size: 1em; }
        
        #active-bonus-container {
            background: rgba(255, 255, 255, 0.04);
            padding: 4px;
            border-radius: 6px;
            margin-bottom: 6px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 0.85em;
        }
        
        .meter-wrap { margin-bottom: 8px; }
        .meter-track {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
        }
        .meter-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--accent-color), var(--primary-color));
            transform-origin: left;
            transform: scaleX(0);
            transition: transform 0.1s linear;
        }

        .choice-container {
            display: flex;
            gap: 12px;
            margin-bottom: 8px;
        }
        .choice-option {
            flex: 1 1 0;
            width: 0;
            background: var(--panel-color);
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: transform 0.1s;
            height: 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
        }
        .choice-content-slot {
            width: 100%;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .choice-text-display { 
            font-size: 2.2em; 
            font-weight: bold;
        }
        .distribution-chart, .stock-chart { 
            position: absolute;
            top: 0; left: 0;
            width: 100% !important; 
            height: 100% !important; 
        }
        .expected-log-return {
            font-size: 0.75em;
            color: var(--accent-color);
            height: 1.2em;
        }
        .hints-hidden .expected-log-return { visibility: hidden; }

        #wealth-chart-container {
            width: 100%;
            height: 160px;
            background: var(--panel-2);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 8px;
        }
        canvas { width: 100% !important; height: 100% !important; }

        .toolbar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 850px;
            margin-bottom: 4px;
        }
        
        button {
            background: var(--primary-color);
            color: #000;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8em;
        }
        button.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="app-shell">
        <div class="toolbar">
            <span style="font-size: 0.8em; color: var(--muted-color)">A/Left | D/Right | H (Hints) | ENTER to Start</span>
            <div>
                <button id="toggle-hints-btn" class="secondary">Hints (H)</button>
                <button id="about-btn" class="secondary">About</button>
            </div>
        </div>
        
        <div class="game-container" id="game-container">
            <div id="start-screen" style="padding: 40px 0;">
                <h1>Log Returns Arcade</h1>
                <p>Build intuition about compounding and decay.</p>
                <button id="start-button">Start Game</button>
            </div>
        </div>
    </div>

    <script>
    const GAME_HTML = `
        <h1>Log Returns Arcade</h1>
        <div class="game-stats">
            <div class="stat-chip"><span class="stat-label">Round</span><span id="round-counter" class="stat-value">1</span></div>
            <div class="stat-chip"><span class="stat-label">Wealth</span><span id="wealth-display" class="stat-value">0</span></div>
            <div class="stat-chip"><span class="stat-label">Streak</span><span id="streak" class="stat-value">0</span></div>
        </div>
        <div id="active-bonus-container">Active: <span id="active-bonus-text" style="color:var(--secondary-color)">None</span></div>
        <div class="meter-wrap">
            <div class="meter-track"><div id="decay-meter-fill" class="meter-fill"></div></div>
        </div>
        <div class="choice-container" id="choice-container">
            <div class="choice-option" id="option-a">
                <div class="choice-content-slot">
                    <canvas class="distribution-chart" id="chart-a"></canvas>
                    <div class="choice-text-display" id="text-display-a"></div>
                </div>
                <div class="expected-log-return" id="log-return-a"></div>
            </div>
            <div class="choice-option" id="option-b">
                <div class="choice-content-slot">
                    <canvas class="distribution-chart" id="chart-b"></canvas>
                    <div class="choice-text-display" id="text-display-b"></div>
                </div>
                <div class="expected-log-return" id="log-return-b"></div>
            </div>
        </div>
        <div id="wealth-chart-container">
            <canvas id="wealth-chart"></canvas>
        </div>
        <div id="about-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; justify-content:center; align-items:center;">
            <div style="background:var(--panel-color); padding:20px; border-radius:12px; max-width:500px; border:1px solid var(--border-color);">
                <h2>About</h2>
                <p>Experimental intuition builder for compounding and log returns.</p>
                <button id="close-about">Close</button>
            </div>
        </div>
    `;

    const TICK_MS = 100;
    const DECAY_MS = 3000;
    const INITIAL_WEALTH = 1000;
    const GAME_SECONDS_PER_YEAR = 90;

    class ChoiceFactory {
        #randn() {
            let u = 0, v = 0;
            while (u === 0) u = Math.random();
            while (v === 0) v = Math.random();
            return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
        }
        generateMultiplierPdfChoice() {
            const n = 100, xMin = -0.03, xMax = 0.03;
            const xs = Array.from({ length: n }, (_, i) => xMin + (i / (n - 1)) * (xMax - xMin));
            const mode = Math.floor(Math.random() * (n * 0.6)) + Math.floor(n * 0.2);
            let ps = Array.from({ length: n }, (_, i) => Math.exp(-Math.pow(Math.abs(i - mode) / (n * 0.12), 2)));
            const area = ps.reduce((sum, p, i) => i === 0 ? 0 : sum + (p + ps[i-1]) / 2 * (xs[i] - xs[i-1]), 0);
            const normPs = ps.map(p => p / area);
            const expectedLogReturn = normPs.reduce((sum, p, i) => i === 0 ? 0 : sum + ((xs[i]*p + xs[i-1]*normPs[i-1])/2) * (xs[i] - xs[i-1]), 0);
            const cdfPoints = []; let acc = 0;
            for(let i=0; i<normPs.length; i++) { acc += normPs[i] * (i > 0 ? (xs[i] - xs[i-1]) : 0); cdfPoints.push(acc); }
            const normalizedCdf = cdfPoints.map(p => p / cdfPoints.at(-1));
            return { type: 'pdf', xs, ps: normPs, cdf: normalizedCdf, sample: () => Math.exp(xs[normalizedCdf.findIndex(p => Math.random() <= p)]), getExpectedLogReturn: () => expectedLogReturn, display: 'PDF' };
        }
        generateEmpiricalStockChoice() {
            const steps = 200, startPrice = 100;
            const muAnnual = 0.05 + Math.random() * 0.04, sigmaAnnual = 0.12 + Math.random() * 0.08;
            const dtSec = 1 / GAME_SECONDS_PER_YEAR;
            const prices = [startPrice], multipliers = [], logReturns = [];
            for (let i = 0; i < steps; i++) {
                const lr = (muAnnual - 0.5 * sigmaAnnual * sigmaAnnual) * dtSec + sigmaAnnual * Math.sqrt(dtSec) * this.#randn();
                multipliers.push(Math.exp(lr));
                prices.push(prices[prices.length - 1] * multipliers[i]);
                logReturns.push(lr);
            }
            const avgLogRet = logReturns.reduce((a,b)=>a+b,0) / logReturns.length;
            return { type: 'empirical', prices, multipliers, sample: () => multipliers[Math.floor(Math.random() * multipliers.length)], getExpectedLogReturn: () => avgLogRet, display: 'Stock' };
        }
        generateAdditionChoice() {
            const value = Math.floor(Math.random() * 13) + 3;
            return { type: 'add', value, display: `+${value}`, sample: () => value, getExpectedLogReturn: () => value };
        }
        generateSimpleMultiplierChoice() {
            const value = 0.995 + Math.random() * 0.01;
            return { type: 'multiply', value, display: `x${value.toFixed(3)}`, sample: () => value, getExpectedLogReturn: () => Math.log(value) };
        }
    }

    class Game {
        constructor() {
            this.gameContainer = document.getElementById('game-container');
            this.startButton = document.getElementById('start-button');
            this.choiceFactory = new ChoiceFactory();
            this.wealthChartInstance = null;
            this.state = {};
            this.hintsVisible = true;
            this.loadDependencies();
            
            this.startButton.onclick = () => this.startGame();
            document.getElementById('toggle-hints-btn').onclick = () => this.toggleHints();
            
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !this.DOM) this.startGame();
                if (!this.DOM) return;
                const key = e.key.toLowerCase();
                if (key === 'arrowleft' || key === 'a') this.selectOption('A');
                if (key === 'arrowright' || key === 'd') this.selectOption('B');
                if (key === 'h') this.toggleHints();
            });
        }

        loadDependencies() {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/chart.js';
            script.onload = () => { this.startButton.disabled = false; };
            document.head.appendChild(script);
        }

        startGame() {
            this.gameContainer.innerHTML = GAME_HTML;
            this.DOM = {
                roundCounter: document.getElementById('round-counter'),
                wealthDisplay: document.getElementById('wealth-display'),
                streak: document.getElementById('streak'),
                activeBonusText: document.getElementById('active-bonus-text'),
                optionA: document.getElementById('option-a'),
                optionB: document.getElementById('option-b'),
                chartA: document.getElementById('chart-a'),
                chartB: document.getElementById('chart-b'),
                textDisplayA: document.getElementById('text-display-a'),
                textDisplayB: document.getElementById('text-display-b'),
                logReturnA: document.getElementById('log-return-a'),
                logReturnB: document.getElementById('log-return-b'),
                wealthChart: document.getElementById('wealth-chart'),
                meter: document.getElementById('decay-meter-fill')
            };
            document.getElementById('about-btn').onclick = () => document.getElementById('about-modal').style.display = 'flex';
            document.getElementById('close-about').onclick = () => document.getElementById('about-modal').style.display = 'none';
            this.resetGame();
        }

        resetGame() {
            if (this.state.decayInterval) clearInterval(this.state.decayInterval);
            this.state = { round: 1, streak: 0, wealth: INITIAL_WEALTH, totalTime: 0 };
            this.wealthHistory = [{ x: 0, y: INITIAL_WEALTH }];
            this.setupWealthChart();
            this.nextRound();
        }

        setupWealthChart() {
            const ctx = this.DOM.wealthChart.getContext('2d');
            this.wealthChartInstance = new Chart(ctx, {
                type: 'line',
                data: { datasets: [{ data: this.wealthHistory, borderColor: '#58c7ff', tension: 0.1, pointRadius: 0 }] },
                options: { maintainAspectRatio: false, animation: false, scales: { y: { type: 'logarithmic' }, x: { type: 'linear' } }, plugins: { legend: { display: false } } }
            });
        }

        nextRound() {
            if (this.state.round > 40) return this.endGame();
            this.state.currentChoices = this.generateChoicePair();
            this.updateDisplay();
        }

        generateChoicePair() {
            const choiceTypes = ['pdf', 'add', 'multiply', 'cdf', 'empirical'];
            const selectedType = choiceTypes[Math.floor(Math.random() * choiceTypes.length)];
            let choiceA, choiceB;
            if (selectedType === 'pdf' || selectedType === 'cdf') {
                choiceA = this.choiceFactory.generateMultiplierPdfChoice();
                choiceB = this.choiceFactory.generateMultiplierPdfChoice();
                if (selectedType === 'cdf') { choiceA.type = 'cdf'; choiceB.type = 'cdf'; }
            } else if (selectedType === 'empirical') {
                choiceA = this.choiceFactory.generateEmpiricalStockChoice();
                choiceB = this.choiceFactory.generateEmpiricalStockChoice();
            } else if (selectedType === 'add') {
                choiceA = this.choiceFactory.generateAdditionChoice();
                choiceB = this.choiceFactory.generateAdditionChoice();
            } else if (selectedType === 'multiply') {
                choiceA = this.choiceFactory.generateSimpleMultiplierChoice();
                choiceB = this.choiceFactory.generateSimpleMultiplierChoice();
            }
            if (choiceA.getExpectedLogReturn() === choiceB.getExpectedLogReturn()) return this.generateChoicePair();
            return { A: choiceA, B: choiceB };
        }

        toggleHints() {
            this.hintsVisible = !this.hintsVisible;
            document.body.classList.toggle('hints-hidden', !this.hintsVisible);
        }

        selectOption(optionKey) {
            if (!this.state.currentChoices) return;
            if (this.state.decayInterval) clearInterval(this.state.decayInterval);
            const selected = this.state.currentChoices[optionKey];
            const other = optionKey === 'A' ? 'B' : 'A';
            if (selected.getExpectedLogReturn() >= this.state.currentChoices[other].getExpectedLogReturn()) this.state.streak++;
            else this.state.streak = 0;
            this.state.activeDecayChoice = selected;
            this.DOM.activeBonusText.textContent = selected.display;
            this.state.activeAddRate = selected.type === 'add' ? selected.value / 3 : null;
            this.state.round++;
            this.startDecayProcess();
            this.nextRound();
        }

        startDecayProcess() {
            const start = Date.now();
            this.state.decayInterval = setInterval(() => {
                const elapsed = Date.now() - start;
                const progress = Math.max(0, 1 - (elapsed / DECAY_MS));
                this.DOM.meter.style.transform = `scaleX(${progress})`;
                const dt = TICK_MS / 1000;
                if (this.state.activeAddRate != null) this.state.wealth += this.state.activeAddRate * progress * dt;
                else {
                    const m = this.state.activeDecayChoice.sample();
                    this.state.wealth *= Math.exp(Math.log(m) * progress * dt);
                }
                this.DOM.wealthDisplay.textContent = this.state.wealth.toFixed(2);
                this.state.totalTime += dt;
                this.wealthHistory.push({ x: this.state.totalTime, y: this.state.wealth });
                if (this.wealthHistory.length > 300) this.wealthHistory.shift();
                this.wealthChartInstance.update('none');
                if (progress <= 0) { clearInterval(this.state.decayInterval); this.DOM.activeBonusText.textContent = "None"; }
            }, TICK_MS);
        }

        updateDisplay() {
            this.DOM.roundCounter.textContent = this.state.round;
            this.DOM.wealthDisplay.textContent = this.state.wealth.toFixed(2);
            this.DOM.streak.textContent = this.state.streak;
            ['A', 'B'].forEach(id => {
                const c = this.state.currentChoices[id];
                const chart = this.DOM[`chart${id}`];
                const text = this.DOM[`textDisplay${id}`];
                const log = this.DOM[`logReturn${id}`];
                log.textContent = `E[log(r)]: ${c.getExpectedLogReturn().toFixed(4)}`;
                if (c.type === 'pdf' || c.type === 'cdf' || c.type === 'empirical') {
                    chart.classList.remove('hidden'); text.classList.add('hidden');
                    if (c.type === 'empirical') this.drawStock(chart, c); else this.drawDist(chart, c);
                } else {
                    chart.classList.add('hidden'); text.classList.remove('hidden'); text.textContent = c.display;
                }
                this.DOM[`option${id}`].onclick = () => this.selectOption(id);
            });
        }

        drawDist(canvas, dist) {
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            ctx.strokeStyle = dist.type === 'cdf' ? '#ff68d4' : '#58c7ff'; ctx.lineWidth = 2;
            const data = dist.type === 'cdf' ? dist.cdf : dist.ps;
            const max = Math.max(...data);
            ctx.beginPath();
            data.forEach((p, i) => {
                const x = (i / (data.length - 1)) * canvas.width;
                const y = canvas.height - (p / max * canvas.height * 0.8) - 5;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.stroke();
        }

        drawStock(canvas, stock) {
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            ctx.strokeStyle = '#58c7ff'; ctx.lineWidth = 2;
            const min = Math.min(...stock.prices), max = Math.max(...stock.prices);
            ctx.beginPath();
            stock.prices.forEach((p, i) => {
                const x = (i / (stock.prices.length - 1)) * canvas.width;
                const y = canvas.height - ((p - min) / (max - min || 1) * canvas.height * 0.8) - 5;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.stroke();
        }

        endGame() { 
            this.DOM = null;
            this.gameContainer.innerHTML = `<h1 style="margin-top:80px;">Final Wealth: ${this.state.wealth.toFixed(2)}</h1><button onclick="location.reload()">Play Again</button>`; 
        }
    }

    new Game();
    </script>
</body>
</html>
